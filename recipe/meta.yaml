{% set name = "offlineimap" %}
{% set version = "8.0.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/OfflineIMAP/offlineimap3/archive/v{{ version }}.tar.gz
  sha256: 82ce54136465ea1cce62f4e961e8c155ac3eee2149fa812763629448902d7d69

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  skip: True  # [win]

requirements:
  host:
    - pip
    - python
    - setuptools
  run:
    - python
    - rfc6555
    - six

test:
  imports:
    - offlineimap
    - offlineimap.folder
  commands:
    - pip check
  requires:
    - pip

about:
  home: http://www.offlineimap.org
  license: GPL-2.0-only
  license_family: GPL
  license_file: COPYING
  summary: 'Read/sync your IMAP mailboxes'
  description: |
    OfflineIMAP is software that downloads your email mailbox(es) as 
    local Maildirs. OfflineIMAP will synchronize both sides via IMAP.
  doc_url: http://www.offlineimap.org/documentation.html
  dev_url: https://github.com/OfflineIMAP/offlineimap

extra:
  recipe-maintainers:
    - jan-janssen
